<!DOCTYPE html>
<html class="scroll-smooth scroll-snap-y scroll-snap-mandatory" lang="ko">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>우리 함께한 200일</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "primary": "#874e58",
                "on-primary": "#ffffff",
                "background": "#f9f9f9",
                "surface": "#f9f9f9",
                "on-surface": "#1a1c1c",
                "primary-container": "#ffb6c1",
                "on-primary-container": "#7b444e",
                "secondary-container": "#fed65b",
                "on-secondary-container": "#745c00",
                "on-surface-variant": "#514345"
            },
            "fontFamily": {
                "label-sm": ["Plus Jakarta Sans"],
                "headline-lg": ["Noto Serif"],
                "body-md": ["Plus Jakarta Sans"],
                "body-lg": ["Plus Jakarta Sans"],
                "display-lg": ["Noto Serif"],
                "headline-md": ["Noto Serif"]
            }
          },
        },
      }
    </script>

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-stationery {
            background-color: #ffffff;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.8), rgba(255, 255, 255, 0.8)),
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        .floating-heart {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-40px) rotate(10deg); opacity: 0.6; }
        }
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease-out;
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }
        .cursor-heart {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            color: #FFB6C1;
            font-size: 14px;
            animation: heartFadeOut 1s forwards;
        }
        @keyframes heartFadeOut {
            0% { transform: translateY(0) scale(1); opacity: 0.8; }
            100% { transform: translateY(-50px) scale(0.5); opacity: 0; }
        }
        html { scroll-snap-type: y mandatory; }
        section, footer {
            scroll-snap-align: start;
            scroll-snap-stop: always;
            position: relative;
        }
        @keyframes heart-burst {
          0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
          100% { transform: translate(calc(-50% + var(--tw-tx)), calc(-50% + var(--tw-ty))) scale(var(--tw-scale)) rotate(var(--tw-rotation)); opacity: 0; }
        }
        .heart-particle {
          position: fixed;
          pointer-events: none;
          z-index: 100;
          animation: heart-burst 1s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }
        
        /* 메뉴 활성화 스타일 (수정된 부분) */
        .nav-link {
            transition: all 0.3s ease;
        }
        .nav-link.active {
            color: #f43f5e; /* rose-500 */
            font-weight: 600;
            border-bottom: 2px solid #facc15; /* yellow-400 */
        }
    </style>
</head>
